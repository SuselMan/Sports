name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "VITE_API_URL=${{ secrets.PUBLIC_API_URL }}" > .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}" >> .env.production
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

      - name: Ensure dirs on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.SSH_LOGIN }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            mkdir -p /var/www/sports-frontend
            mkdir -p ~/sports

      - name: Upload frontend build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.SSH_LOGIN }}
          password: ${{ secrets.SSH_PASS }}
          source: "frontend/dist/**"
          strip_components: 2
          target: "/var/www/sports-frontend"

      - name: Upload project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.SSH_LOGIN }}
          password: ${{ secrets.SSH_PASS }}
          source: "backend/,shared/,docker/,docker-compose.yml"
          target: "~/sports"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.SSH_LOGIN }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            cd ~/sports
            docker compose build --no-cache backend
            docker compose up -d
            sleep 5
            curl -sf http://127.0.0.1:4000/health || (docker compose logs backend --tail 20 && exit 1)
